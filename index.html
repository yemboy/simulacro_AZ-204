<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AZ-204 Practice Exams</title>
<style>
  :root{
    --bg:#f4f6f9; --card:#ffffff; --ink:#1a2332; --muted:#5c6b80;
    --accent:#0b5cad; --accent2:#0a4d91; --ok:#1a7f4e; --bad:#c0392b;
    --warn:#b7791f; --border:#dbe2ec; --lock:#8a93a3;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--ink); line-height:1.5;}
  .wrap{max-width:1100px; margin:0 auto; padding:16px;}
  .card{background:var(--card); border:1px solid var(--border); border-radius:10px; padding:24px;}
  h1{font-size:1.4rem; margin-bottom:8px;}
  h2{font-size:1.1rem; margin-bottom:8px;}
  .muted{color:var(--muted); font-size:.92rem;}
  button{font:inherit; cursor:pointer; border:none; border-radius:8px;}
  .btn{background:var(--accent); color:#fff; padding:10px 20px; font-weight:600;}
  .btn:hover{background:var(--accent2);}
  .btn.sec{background:#e8edf4; color:var(--ink);}
  .btn.danger{background:var(--bad); color:#fff;}
  .btn:disabled{opacity:.45; cursor:not-allowed;}
  .langbtn{background:#fff; border:1.5px solid var(--accent); color:var(--accent); padding:6px 14px; font-weight:700; font-size:.85rem; border-radius:20px;}
  .langbtn:hover{background:#eef4fb;}
  .toprow{display:flex; justify-content:space-between; align-items:flex-start; gap:12px;}
  /* Header bar */
  #bar{position:sticky; top:0; z-index:10; background:var(--card); border-bottom:2px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:12px;}
  #timer{font-variant-numeric:tabular-nums; font-weight:700; font-size:1.25rem; padding:4px 12px; border-radius:8px; background:#e8edf4;}
  #timer.low{background:#fdecea; color:var(--bad);}
  #prog{flex:1; color:var(--muted); font-size:.9rem;}
  /* Layout */
  #examGrid{display:grid; grid-template-columns:1fr 230px; gap:16px; margin-top:16px;}
  @media(max-width:820px){#examGrid{grid-template-columns:1fr;}}
  /* Question */
  .qdom{display:inline-block; font-size:.75rem; font-weight:700; letter-spacing:.4px; text-transform:uppercase; color:var(--accent); background:#e7f0fa; padding:2px 10px; border-radius:20px; margin-bottom:10px;}
  .qtext{font-size:1.02rem; margin-bottom:16px; white-space:pre-wrap;}
  .qtext pre{background:#f0f3f8; border:1px solid var(--border); border-radius:8px; padding:12px; overflow-x:auto; font-size:.88rem; margin:10px 0; white-space:pre;}
  code{background:#f0f3f8; padding:1px 5px; border-radius:4px; font-size:.88em;}
  .scenario{background:#fff8e8; border:1px solid #edd9a3; border-radius:8px; padding:12px 14px; margin-bottom:14px; font-size:.95rem;}
  .locknote{background:#fdecea; border:1px solid #f0b8b0; border-radius:8px; padding:8px 12px; margin-bottom:12px; font-size:.88rem; color:var(--bad);}
  .opt{display:flex; gap:10px; align-items:flex-start; border:1.5px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:10px; cursor:pointer; transition:border-color .12s, background .12s;}
  .opt:hover{border-color:var(--accent);}
  .opt.sel{border-color:var(--accent); background:#eef4fb;}
  .opt.dis{cursor:not-allowed; opacity:.65;}
  .opt input{margin-top:4px; accent-color:var(--accent);}
  .opt .lbl{flex:1;}
  .opt code{white-space:normal; word-break:break-word;}
  /* Order type */
  .ordItem{display:flex; align-items:center; gap:12px; border:1.5px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:10px; cursor:pointer;}
  .ordItem:hover{border-color:var(--accent);}
  .ordItem .pos{min-width:34px; height:34px; border-radius:50%; background:#e8edf4; display:flex; align-items:center; justify-content:center; font-weight:700; color:var(--muted);}
  .ordItem.done{border-color:var(--accent); background:#eef4fb;}
  .ordItem.done .pos{background:var(--accent); color:#fff;}
  /* Nav grid */
  #navgrid{display:grid; grid-template-columns:repeat(5,1fr); gap:6px;}
  #navgrid button{aspect-ratio:1; border:1.5px solid var(--border); background:#fff; border-radius:6px; font-size:.82rem; font-weight:600; color:var(--muted);}
  #navgrid button.answered{background:#dcebdd; border-color:#9ec4a4; color:var(--ok);}
  #navgrid button.current{border-color:var(--accent); background:var(--accent); color:#fff;}
  #navgrid button.lockedq{background:#e9ebef; border-color:var(--lock); color:var(--lock);}
  .side .card{padding:16px;}
  .legend{font-size:.78rem; color:var(--muted); margin-top:10px; line-height:1.7;}
  .dot{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:middle;}
  .navrow{display:flex; gap:10px; justify-content:space-between; margin-top:18px;}
  /* Results */
  table{width:100%; border-collapse:collapse; margin:14px 0;}
  th,td{padding:8px 12px; text-align:left; border-bottom:1px solid var(--border); font-size:.92rem;}
  th{color:var(--muted); font-weight:600;}
  .score{font-size:2.4rem; font-weight:800;}
  .pass{color:var(--ok);} .fail{color:var(--bad);}
  .rev{border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:12px;}
  .rev.wrong{border-left:4px solid var(--bad);}
  .rev.right{border-left:4px solid var(--ok);}
  .rev .qn{font-weight:700; margin-bottom:6px;}
  .rev .exp{background:#f0f6ee; border-radius:6px; padding:8px 12px; margin-top:8px; font-size:.9rem;}
  .rev .yours{font-size:.92rem; margin-top:6px;}
  .tag{font-size:.72rem; font-weight:700; padding:2px 8px; border-radius:12px; margin-left:8px; vertical-align:middle;}
  .tag.ok{background:#dcebdd; color:var(--ok);} .tag.ko{background:#fdecea; color:var(--bad);}
  #ansString{width:100%; font-family:monospace; font-size:.82rem; padding:10px; border:1px solid var(--border); border-radius:8px; margin-top:8px; background:#f8f9fb;}
  .filterrow{margin:12px 0;}
  .hidden{display:none;}
  ul.rules{margin:12px 0 18px 22px;}
  ul.rules li{margin-bottom:6px;}
</style>
</head>
<body>

<div id="bar" class="hidden">
  <div id="timer">100:00</div>
  <div id="prog"></div>
  <button class="langbtn" onclick="toggleLang()" id="langBar"></button>
  <button class="btn danger" onclick="confirmSubmit()" id="submitBar"></button>

        </div>
      </div>

</div>

{n:16, dom:"S", type:"multi", ans:["A","B"],

/* ================= STATE ================= */
let examTime = 100*60;
let Q = EXAM1;
let curExam = 1;
let lang = "es";
let view = "start";           // start | exam | results
let remaining = examTime;
let timerId = null;
let cur = 0;
const answers = {};
const locked = new Set();
let finished = false;
let result = null;            // {score, domScore, auto, usedSec}

/* ================= LANG HELPERS ================= */
function S(){ return L[lang]; }
function qT(q){ return q[lang].text; }
function qO(q){ return q[lang].opts || q.es.opts; }
function qE(q){ return q[lang].exp; }
function toggleLang(){
  lang = lang==="es" ? "en" : "es";
  document.documentElement.lang = lang;
  refresh();
}
function refresh(){
  document.getElementById("langBar").textContent = S().langBtn;
  document.getElementById("submitBar").textContent = S().submit;
  if(view==="start") renderStart();
  else if(view==="exam"){ renderSide(); render(); }
  else renderResults();
}

/* ================= START SCREEN ================= */
function renderStart(){
  const s = S();
  let h = '<div class="toprow"><h1>'+s.title+'</h1>'
    + '<button class="langbtn" onclick="toggleLang()">'+s.langBtn+'</button></div>'
    + '<h2>'+s.rulesH+'</h2><ul class="rules">'
    + s.rules.map(r=>'<li>'+r+'</li>').join('')
    + '</ul><h2>'+s.chooseExam+'</h2>';
  for(const id of [1,2,3]){
    const m = EXAMS[id][lang];
    h += '<div style="border:1.5px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:12px;">'
       + '<strong>'+m.name+'</strong>'
       + '<p class="muted" style="margin:6px 0 10px;">'+m.desc+'</p>'
       + '<button class="btn" onclick="startExam('+id+')">'+s.start+'</button></div>';
  }
  document.getElementById("start").innerHTML = h;
}

/* ================= TIMER ================= */
function startExam(id){
  curExam = id || 1;
  Q = ({1:EXAM1, 2:EXAM2, 3:EXAM3})[curExam];
  examTime = EXAMS[curExam].time;
  remaining = examTime;
  document.getElementById("timer").textContent = String(Math.floor(examTime/60)).padStart(2,"0")+":00";
  view = "exam";
  document.getElementById("start").classList.add("hidden");
  document.getElementById("exam").classList.remove("hidden");
  document.getElementById("bar").classList.remove("hidden");
  document.getElementById("langBar").textContent = S().langBtn;
  document.getElementById("submitBar").textContent = S().submit;
  timerId = setInterval(tick, 1000);
  renderSide(); render();
  window.addEventListener("beforeunload", beforeUnload);
}
function beforeUnload(e){ if(!finished){ e.preventDefault(); e.returnValue=""; } }
function tick(){
  remaining--;
  const t = document.getElementById("timer");
  const m = Math.floor(remaining/60), s = remaining%60;
  t.textContent = String(m).padStart(2,"0")+":"+String(s).padStart(2,"0");
  if(remaining <= 600) t.classList.add("low");
  if(remaining <= 0){ clearInterval(timerId); submit(true); }
}

/* ================= HELPERS ================= */
function isAnswered(q){
  const a = answers[q.n];
  if(a == null) return false;
  if(q.type==="order") return a.length === Object.keys(qO(q)).length;
  if(q.type==="multi") return a.length > 0;
  return true;
}
function lockIfSeries(idx){
  const q = Q[idx];
  if(q && q.series && isAnswered(q)) locked.add(q.n);
}

/* ================= RENDER ================= */
function renderSide(){
  const s = S();
  document.getElementById("navTitle").textContent = s.navTitle;
  document.getElementById("legend").innerHTML =
    '<span class="dot" style="background:#dcebdd;border:1px solid #9ec4a4;"></span>'+s.legend[0]+'<br>'
    + '<span class="dot" style="background:#fff;border:1px solid var(--border);"></span>'+s.legend[1]+'<br>'
    + '<span class="dot" style="background:#e9ebef;border:1px solid var(--lock);"></span>'+s.legend[2];
}
function render(){
  const q = Q[cur];
  const s = S();
  const card = document.getElementById("qcard");
  let h = "";
  h += '<span class="qdom">'+s.domNames[q.dom]+'</span>';
  if(q.series){
    const sr = SERIES[q.series][lang];
    h += '<div class="scenario"><strong>'+sr.title+'</strong><br>'+sr.text+'</div>';
    h += locked.has(q.n)
      ? '<div class="locknote">'+s.seriesLocked+'</div>'
      : '<div class="locknote" style="background:#fff8e8;border-color:#edd9a3;color:#7a5c10;">'+sr.note+'</div>';
  }
  h += '<div class="qtext"><strong>'+q.n+'.</strong> '+qT(q)+'</div>';

  const isLocked = locked.has(q.n);
  if(q.type==="order"){
    const seq = answers[q.n] || [];
    h += '<div>';
    for(const [k,v] of Object.entries(qO(q))){
      const pos = seq.indexOf(k);
      h += '<div class="ordItem'+(pos>=0?' done':'')+'" onclick="ordClick(\''+k+'\')">'
         + '<div class="pos">'+(pos>=0?(pos+1)+'º':'—')+'</div><div>'+k+') '+v+'</div></div>';
    }
    h += '</div><button class="btn sec" onclick="ordReset()">'+s.resetOrder+'</button>';
  } else {
    const type = q.type==="multi" ? "checkbox" : "radio";
    if(q.type==="multi") h += '<p class="muted" style="margin-bottom:10px;">'+s.selectN(q.ans.length)+'</p>';
    for(const [k,v] of Object.entries(qO(q))){
      const a = answers[q.n];
      const sel = q.type==="multi" ? (a||[]).includes(k) : a===k;
      h += '<label class="opt'+(sel?' sel':'')+(isLocked?' dis':'')+'">'
         + '<input type="'+type+'" name="q'+q.n+'" value="'+k+'"'+(sel?' checked':'')+(isLocked?' disabled':'')
         + ' onchange="pick(\''+k+'\', this.checked)">'
         + '<span class="lbl"><strong>'+k+')</strong> '+v+'</span></label>';
    }
  }

  h += '<div class="navrow">'
     + '<button class="btn sec" onclick="go(cur-1)"'+(cur===0?' disabled':'')+'>'+s.prev+'</button>'
     + '<button class="btn" onclick="go(cur+1)"'+(cur===Q.length-1?' disabled':'')+'>'+s.next+'</button>'
     + '</div>';

  card.innerHTML = h;
  renderNav();
  const answeredCount = Q.filter(x=>isAnswered(x)).length;
  document.getElementById("prog").textContent = s.progress(cur+1, Q.length, answeredCount);
}
function renderNav(){
  const g = document.getElementById("navgrid");
  g.innerHTML = Q.map((q,i)=>{
    let cls = "";
    if(locked.has(q.n)) cls = "lockedq";
    else if(isAnswered(q)) cls = "answered";
    if(i===cur) cls += " current";
    return '<button class="'+cls+'" onclick="go('+i+')">'+q.n+'</button>';
  }).join("");
}

/* ================= INTERACTION ================= */
function pick(k, checked){
  const q = Q[cur];
  if(locked.has(q.n)) return;
  if(q.type==="multi"){
    let a = answers[q.n] || [];
    if(checked){ if(!a.includes(k)) a.push(k); }
    else a = a.filter(x=>x!==k);
    answers[q.n] = a;
  } else {
    answers[q.n] = k;
  }
  render();
}
function ordClick(k){
  const q = Q[cur];
  let seq = answers[q.n] || [];
  if(seq.includes(k)) return;
  seq.push(k);
  answers[q.n] = seq;
  render();
}
function ordReset(){
  delete answers[Q[cur].n];
  render();
}
function go(i){
  if(i<0 || i>=Q.length) return;
  lockIfSeries(cur);
  cur = i;
  render();
  window.scrollTo({top:0});
}

/* ================= GRADING ================= */
function gradeQ(q){
  const a = answers[q.n];
  if(a==null) return false;
  if(q.type==="multi") return Array.isArray(a) && [...a].sort().join()===[...q.ans].sort().join();
  if(q.type==="order") return Array.isArray(a) && a.join()===q.ans.join();
  return a===q.ans;
}
function fmtAns(a){
  if(a==null) return S().unanswered;
  return Array.isArray(a) ? "("+a.join(", ")+")" : a;
}
function confirmSubmit(){
  const unanswered = Q.filter(q=>!isAnswered(q)).length;
  const msg = unanswered>0 ? S().confirmUn(unanswered) : S().confirmOk;
  if(confirm(msg)) submit(false);
}
function submit(auto){
  finished = true;
  clearInterval(timerId);
  window.removeEventListener("beforeunload", beforeUnload);
  lockIfSeries(cur);

  let score = 0;
  const domScore = {C:0,I:0,S:0,G:0,M:0};
  for(const q of Q){ if(gradeQ(q)){ score++; domScore[q.dom]++; } }
  result = {score, domScore, auto, usedSec: examTime - Math.max(remaining,0)};
  view = "results";
  document.getElementById("exam").classList.add("hidden");
  document.getElementById("bar").classList.add("hidden");
  renderResults();
  window.scrollTo({top:0});
}
function renderResults(){
  const s = S();
  const {score, domScore, auto, usedSec} = result;
  const target = Math.ceil(Q.length*0.8);
  const pass = score >= target;
  const usedMin = Math.floor(usedSec/60), usedS = usedSec%60;

  let h = '<div class="card">';
  h += '<div class="toprow"><h1>'+s.resultH+' — '+EXAMS[curExam][lang].name+'</h1>'
     + '<button class="langbtn" onclick="toggleLang()">'+s.langBtn+'</button></div>';
  if(auto) h += '<div class="locknote">'+s.autoNote+'</div>';
  h += '<div class="score '+(pass?"pass":"fail")+'">'+score+' / '+Q.length+'</div>'
    + '<p class="muted">'+(pass?s.passMsg(target,Q.length):s.failMsg(target,Q.length))+'</p>'
    + '<p class="muted">'+s.timeUsed(usedMin,usedS,Math.round(examTime/60))+'</p>';

  const totals = {C:0,I:0,S:0,G:0,M:0};
  for(const q of Q) totals[q.dom]++;
  h += '<h2 style="margin-top:18px;">'+s.domH+'</h2><table><tr><th>'+s.domCol+'</th><th>'+s.ptsCol+'</th><th>%</th></tr>';
  for(const d of ["C","I","S","G","M"]){
    const pct = Math.round(100*domScore[d]/totals[d]);
    h += '<tr><td>'+s.domNames[d]+'</td><td>'+domScore[d]+' / '+totals[d]+'</td>'
       + '<td style="color:'+(pct>=80?"var(--ok)":"var(--bad)")+';font-weight:600;">'+pct+'%</td></tr>';
  }
  h += '</table>';

  const ansStr = Q.map(q=>q.n+"-"+(answers[q.n]==null?"∅":fmtAns(answers[q.n]))).join(", ");
  h += '<h2 style="margin-top:10px;">'+s.yourAnsH+'</h2>'
     + '<textarea id="ansString" rows="4" readonly>'+ansStr+'</textarea>';

  h += '<div class="filterrow"><button class="btn sec" onclick="filterRev(false)">'+s.viewAll+'</button> '
     + '<button class="btn" onclick="filterRev(true)">'+s.viewWrong(Q.length-score)+'</button> '
     + '<button class="btn sec" onclick="location.reload()">'+s.backMenu+'</button></div>';
  h += '</div><div style="margin-top:16px;" id="revList">';

  for(const q of Q){
    const ok = gradeQ(q);
    h += '<div class="rev '+(ok?"right":"wrong")+'" data-ok="'+ok+'">'
       + '<div class="qn">'+q.n+'. <span class="muted" style="font-weight:400;">['+s.domNames[q.dom]+']</span>'
       + '<span class="tag '+(ok?"ok":"ko")+'">'+(ok?s.correct:s.incorrect)+'</span></div>'
       + '<div style="font-size:.93rem;">'+qT(q)+'</div>'
       + '<div class="yours">'+s.yourAns+': <strong>'+fmtAns(answers[q.n])+'</strong> · '+s.corrAns+': <strong>'+fmtAns(q.ans)+'</strong></div>'
       + '<div class="exp">'+qE(q)+'</div></div>';
  }
  h += '</div>';

  const r = document.getElementById("results");
  r.innerHTML = h;
  r.classList.remove("hidden");
}
function filterRev(onlyWrong){
  document.querySelectorAll("#revList .rev").forEach(el=>{
    el.style.display = (onlyWrong && el.dataset.ok==="true") ? "none" : "";
  });
}

/* ================= INIT ================= */
renderStart();
</script>
